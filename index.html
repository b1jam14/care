<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ma PWA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
</head>

<body>

  <h1>Ma PWA 🚀</h1>
  <button id="enableNotifications">Activer les notifications</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAOlAIN2F0KZqNuvoh5ohlT66OdOhzz7P8",
      authDomain: "care-2cbc1.firebaseapp.com",
      projectId: "care-2cbc1",
      storageBucket: "care-2cbc1.firebasestorage.app",
      messagingSenderId: "102325538795",
      appId: "1:102325538795:web:51648a53db1cc0f1d093ae"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    async function enableNotifications() {
      const permission = await Notification.requestPermission();

      if (permission !== "granted") {
        alert("Notifications refusées");
        return;
      }

      const registration = await navigator.serviceWorker.register(
        "/Care/firebase-messaging-sw.js"
      );

      const token = await getToken(messaging, {
        vapidKey: "BNVaU-yEJWK5gp6p1km6mZMc95l769Vji6j4GS7tVId7Q6ZCmYCGS0_brkDpgBI9hc4GIrO4pkgQIK_-ySgFAGg",
        serviceWorkerRegistration: registration
      });

      console.log("FCM token:", token);
      alert("Notifications activées !");
    }

    document
      .getElementById("enableNotifications")
      .addEventListener("click", enableNotifications);

    onMessage(messaging, payload => {
      console.log("Message reçu:", payload);
      alert(payload.notification?.title || "Notification reçue");
    });
  </script>

</body>
</html>
